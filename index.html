<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tunnel Digger</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    touch-action: none;
    user-select: none;
  }
  #frame { position: relative; line-height: 0; }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
  }
  /* optional CRT scanlines, toggled with C */
  #scan {
    position: absolute; inset: 0; pointer-events: none; display: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0)   0px,
      rgba(0,0,0,0)   2px,
      rgba(0,0,0,0.22) 3px
    );
  }
  #scan.on { display: block; }
  #hint {
    color: #555; font: 11px monospace; margin-top: 10px; text-align: center;
  }
  #touch {
    display: none; width: min(430px, 96vw); height: 132px;
    align-items: center; justify-content: space-between; margin-top: 4px;
  }
  #dpad { display: grid; grid-template-columns: repeat(3, 42px); grid-template-rows: repeat(3, 42px); }
  #dpad [data-action="up"] { grid-column: 2; grid-row: 1; }
  #dpad [data-action="left"] { grid-column: 1; grid-row: 2; }
  #dpad [data-action="down"] { grid-column: 2; grid-row: 3; }
  #dpad [data-action="right"] { grid-column: 3; grid-row: 2; }
  #touch button {
    border: 2px solid #596078; background: #15182a; color: #fff;
    font: bold 18px monospace; border-radius: 10px; margin: 2px;
    box-shadow: inset 0 -4px rgba(0,0,0,.35); -webkit-tap-highlight-color: transparent;
  }
  #touch button:active { transform: translateY(2px); background: #30375b; }
  #actions { display: grid; grid-template-columns: 62px 62px; grid-template-rows: 44px 72px; align-items: center; }
  #actions [data-action="start"] { grid-column: 1 / 3; font-size: 11px; height: 34px; }
  #actions [data-action="pause"] { font-size: 11px; height: 42px; }
  #actions [data-action="fire"] { width: 68px; height: 68px; border-radius: 50%; border-color: #ffd800; color: #ffd800; }
  @media (pointer: coarse), (max-width: 700px) {
    #touch { display: flex; }
    #hint { display: none; }
  }
</style>
</head>
<body>
  <div id="frame">
    <canvas id="game" width="224" height="288"></canvas>
    <div id="scan"></div>
  </div>
  <div id="hint">ARROWS/WASD move &nbsp; SPACE/Z pump &nbsp; ENTER start &nbsp; P pause &nbsp; M mute &nbsp; C scanlines</div>
  <div id="touch" aria-label="Touch game controls">
    <div id="dpad">
      <button data-action="up" aria-label="Move up">▲</button>
      <button data-action="left" aria-label="Move left">◀</button>
      <button data-action="down" aria-label="Move down">▼</button>
      <button data-action="right" aria-label="Move right">▶</button>
    </div>
    <div id="actions">
      <button data-action="start" aria-label="Start game">START</button>
      <button data-action="pause" aria-label="Pause game">PAUSE</button>
      <button data-action="fire" aria-label="Pump">PUMP</button>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
